services:
  booking_pg:
    image: postgres:16
    env_file:
      - .env
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 15

  booking_service:
    build:
      context: ./booking_service
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8010:8010"
    depends_on:
      booking_pg:
        condition: service_healthy