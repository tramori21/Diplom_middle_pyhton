services:
  booking_pg:
    image: postgres:16
    environment:
      POSTGRES_DB: booking
      POSTGRES_USER: app
      POSTGRES_PASSWORD: 123qwe
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d booking"]
      interval: 5s
      timeout: 5s
      retries: 15

  booking_service:
    build:
      context: ./booking_service
      dockerfile: Dockerfile
    environment:
      PROJECT_NAME: booking_service
      APP_HOST: 0.0.0.0
      APP_PORT: 8010

      POSTGRES_DB: booking
      POSTGRES_USER: app
      POSTGRES_PASSWORD: 123qwe
      POSTGRES_HOST: booking_pg
      POSTGRES_PORT: 5432

      AUTH_JWT_SECRET: change_me
      AUTH_JWT_ALGORITHM: HS256

      MOVIES_API_URL: http://movies_api:8000
      MOVIES_API_VALIDATE: "false"
    ports:
      - "8010:8010"
    depends_on:
      booking_pg:
        condition: service_healthy